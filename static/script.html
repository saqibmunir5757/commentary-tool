<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Script to Avatar Video</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0a0e14;
            color: #c5cdd8;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }
        .container {
            width: 100%;
            max-width: 700px;
        }
        h1 {
            font-size: 22px;
            font-weight: 700;
            color: #e2e8f0;
            margin-bottom: 6px;
        }
        .subtitle {
            font-size: 13px;
            color: #6b7a8d;
            margin-bottom: 32px;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #8a9bb0;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        textarea {
            width: 100%;
            min-height: 300px;
            background: #0d1117;
            border: 1px solid #1e2a3a;
            border-radius: 8px;
            color: #c5cdd8;
            font-family: inherit;
            font-size: 14px;
            line-height: 1.7;
            padding: 16px;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }
        textarea:focus { border-color: #4fc3f7; }
        textarea:disabled { opacity: 0.5; cursor: not-allowed; background: #0a0e14; }
        textarea::placeholder { color: #3a4a5c; }
        .char-count {
            text-align: right;
            font-size: 11px;
            color: #3a4a5c;
            margin-top: 6px;
            margin-bottom: 24px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            justify-content: center;
            text-decoration: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #4fc3f7 0%, #2196f3 100%);
            color: #fff;
        }
        .btn-primary:hover { opacity: 0.9; }
        .btn-primary:disabled {
            background: #1e2a3a;
            color: #4a5568;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: #1a2030;
            color: #8a9bb0;
            border: 1px solid #1e2a3a;
            margin-top: 12px;
        }
        .btn-secondary:hover { background: #1e2a3a; color: #c5cdd8; }
        .progress-section {
            margin-top: 24px;
        }
        .progress-section.hidden { display: none; }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #1a2030;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4fc3f7, #2196f3);
            border-radius: 3px;
            width: 0%;
            transition: width 0.4s ease;
        }
        .status-text {
            font-size: 13px;
            color: #6b7a8d;
        }
        .result-section {
            margin-top: 28px;
            padding: 20px;
            background: #0d1117;
            border: 1px solid #1e3a2a;
            border-radius: 8px;
        }
        .result-section.hidden { display: none; }
        .result-section .label {
            font-size: 13px;
            color: #4caf50;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .video-preview {
            width: 100%;
            border-radius: 6px;
            background: #000;
            margin-bottom: 16px;
        }
        .btn-download {
            background: #1e3a2a;
            color: #4caf50;
            border: 1px solid #2a5a3a;
        }
        .btn-download:hover { background: #2a5a3a; }
        .error-msg {
            margin-top: 16px;
            padding: 12px 16px;
            background: #2a1a1a;
            border: 1px solid #4a2a2a;
            border-radius: 8px;
            color: #f44336;
            font-size: 13px;
        }
        .error-msg.hidden { display: none; }
        .nav-links {
            margin-top: 32px;
            padding-top: 16px;
            border-top: 1px solid #1a2030;
            font-size: 12px;
            color: #3a4a5c;
        }
        .nav-links a {
            color: #4fc3f7;
            text-decoration: none;
            margin-right: 16px;
        }
        .nav-links a:hover { text-decoration: underline; }
        .close-tab-banner {
            margin-top: 16px;
            padding: 12px 16px;
            background: #0d1925;
            border: 1px solid #1e3a4a;
            border-radius: 8px;
            color: #4fc3f7;
            font-size: 13px;
            display: none;
            align-items: center;
            gap: 8px;
        }
        .close-tab-banner .dismiss {
            margin-left: auto;
            background: none;
            border: none;
            color: #4a5568;
            cursor: pointer;
            font-size: 16px;
        }
        .close-tab-banner .dismiss:hover { color: #c5cdd8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Script to Avatar Video</h1>
        <p class="subtitle">Paste your script below and generate a single HeyGen avatar video.</p>

        <label for="scriptInput">Your Script</label>
        <textarea id="scriptInput" placeholder="Paste your full script here. Multiple paragraphs are fine — it will all be generated as one continuous video."></textarea>
        <div class="char-count"><span id="charCount">0</span> characters</div>

        <button class="btn btn-primary" id="generateBtn" onclick="generate()">Generate Avatar Video</button>

        <div class="progress-section hidden" id="progressSection">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="status-text" id="statusText">Starting...</div>
        </div>

        <div class="close-tab-banner" id="closeTabBanner">
            <span>You can close this tab safely. Check progress on the <a href="/script-history" style="color:#4fc3f7;text-decoration:underline;">History page</a> anytime.</span>
            <button class="dismiss" onclick="document.getElementById('closeTabBanner').style.display='none'">&times;</button>
        </div>

        <div class="error-msg hidden" id="errorMsg"></div>

        <div class="result-section hidden" id="resultSection">
            <div class="label">Video ready!</div>
            <video id="videoPreview" class="video-preview" controls></video>
            <a id="downloadLink" href="#" download>
                <button class="btn btn-download">Download MP4</button>
            </a>
        </div>

        <a href="/script-history" class="btn btn-secondary">View History</a>

        <div class="nav-links">
            <a href="/">Home</a>
        </div>
    </div>

    <script>
        const scriptInput = document.getElementById('scriptInput');
        const charCount = document.getElementById('charCount');

        scriptInput.addEventListener('input', () => {
            charCount.textContent = scriptInput.value.length;
        });

        // ── connectSSE: auto-reconnect with exponential backoff ──
        function connectSSE(url, handlers) {
            let retries = 0;
            const maxRetries = 5;
            const maxDelay = 15000;
            let es = null;

            function connect() {
                es = new EventSource(url);
                es.onmessage = (e) => {
                    retries = 0; // reset on success
                    if (handlers.onMessage) handlers.onMessage(e);
                };
                es.onerror = () => {
                    es.close();
                    if (retries < maxRetries) {
                        const delay = Math.min(1000 * Math.pow(2, retries), maxDelay);
                        retries++;
                        setTimeout(connect, delay);
                    } else {
                        if (handlers.onError) handlers.onError();
                    }
                };
            }
            connect();
            return { close: () => { retries = maxRetries; if (es) es.close(); } };
        }

        // ── Reset to fresh state ──
        function resetToFresh() {
            scriptInput.disabled = false;
            scriptInput.value = '';
            charCount.textContent = '0';
            document.getElementById('progressSection').classList.add('hidden');
            document.getElementById('resultSection').classList.add('hidden');
            document.getElementById('errorMsg').classList.add('hidden');
            document.getElementById('closeTabBanner').style.display = 'none';
            document.getElementById('generateBtn').disabled = false;
            document.getElementById('generateBtn').textContent = 'Generate Avatar Video';
            localStorage.removeItem('active_script_job_id');
            localStorage.removeItem('active_script_text');
        }

        // ── Show greyed script text during processing ──
        function showScriptReference(text) {
            if (text) {
                scriptInput.value = text;
                charCount.textContent = text.length;
            }
            scriptInput.disabled = true;
        }

        // ── Show error message ──
        function showError(msg) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = msg;
            errorMsg.classList.remove('hidden');
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('statusText').textContent = 'Generation failed.';
            document.getElementById('closeTabBanner').style.display = 'none';
            document.getElementById('generateBtn').disabled = false;
            document.getElementById('generateBtn').textContent = 'Retry';
            scriptInput.disabled = false;
        }

        // ── Stream a running job ──
        function streamJob(jobId, scriptText) {
            const progressSection = document.getElementById('progressSection');
            const progressFill = document.getElementById('progressFill');
            const statusText = document.getElementById('statusText');
            const btn = document.getElementById('generateBtn');

            // Show script text as greyed reference
            if (scriptText) {
                showScriptReference(scriptText);
            } else {
                // Try localStorage fallback
                const saved = localStorage.getItem('active_script_text');
                if (saved) showScriptReference(saved);
            }

            progressSection.classList.remove('hidden');
            progressFill.style.width = '5%';
            statusText.textContent = 'Generating avatar video...';
            btn.disabled = true;
            btn.textContent = 'Generating...';
            document.getElementById('closeTabBanner').style.display = 'flex';
            document.getElementById('errorMsg').classList.add('hidden');
            document.getElementById('resultSection').classList.add('hidden');

            let msgCount = 0;
            connectSSE(`/stream/${jobId}`, {
                onMessage: (e) => {
                    const event = JSON.parse(e.data);
                    if (event.type === 'progress') {
                        msgCount++;
                        progressFill.style.width = Math.min(5 + Math.round(msgCount * 2), 90) + '%';
                        statusText.textContent = 'Generating avatar video...';
                    } else if (event.type === 'done') {
                        progressFill.style.width = '100%';
                        statusText.textContent = 'Video generated! Check History page.';
                        document.getElementById('closeTabBanner').style.display = 'none';
                        btn.disabled = false;
                        btn.textContent = 'Generate New Video';
                        scriptInput.disabled = false;
                        scriptInput.value = '';
                        charCount.textContent = '0';
                        localStorage.removeItem('active_script_job_id');
                        localStorage.removeItem('active_script_text');
                    } else if (event.type === 'error') {
                        showError(event.message);
                        localStorage.removeItem('active_script_job_id');
                        localStorage.removeItem('active_script_text');
                    }
                },
                onError: () => {
                    fetch(`/script-job/${jobId}`).then(r => r.json()).then(job => {
                        if (job.status === 'completed') {
                            progressFill.style.width = '100%';
                            statusText.textContent = 'Video generated! Check History page.';
                            document.getElementById('closeTabBanner').style.display = 'none';
                            btn.disabled = false;
                            btn.textContent = 'Generate New Video';
                            scriptInput.disabled = false;
                            scriptInput.value = '';
                            charCount.textContent = '0';
                        } else if (job.status === 'failed') {
                            showError(job.error || 'Generation failed.');
                        } else {
                            showError('Connection lost. Check the History page for results.');
                        }
                    }).catch(() => {
                        showError('Connection lost. Check the History page for results.');
                    });
                    localStorage.removeItem('active_script_job_id');
                    localStorage.removeItem('active_script_text');
                },
            });
        }

        // ── Generate: submit script and stream ──
        async function generate() {
            const text = scriptInput.value.trim();
            if (!text) return;

            const btn = document.getElementById('generateBtn');
            btn.disabled = true;
            btn.textContent = 'Generating...';
            document.getElementById('errorMsg').classList.add('hidden');
            document.getElementById('resultSection').classList.add('hidden');

            try {
                const form = new FormData();
                form.append('script_text', text);

                const res = await fetch('/generate-script-video', { method: 'POST', body: form });
                const data = await res.json();

                if (data.error) {
                    showError(data.error);
                    document.getElementById('progressSection').classList.add('hidden');
                    return;
                }

                localStorage.setItem('active_script_job_id', data.job_id);
                localStorage.setItem('active_script_text', text);
                streamJob(data.job_id, text);

            } catch (err) {
                showError('Request failed: ' + err.message);
                document.getElementById('progressSection').classList.add('hidden');
            }
        }

        // ── Init: recover state on page load ──
        async function init() {
            const savedJobId = localStorage.getItem('active_script_job_id');
            if (savedJobId) {
                try {
                    const res = await fetch(`/script-job/${savedJobId}`);
                    const job = await res.json();
                    if (job.status === 'running') {
                        // Reconnect — restore script text from localStorage or server
                        const scriptText = localStorage.getItem('active_script_text') || job.script_text || '';
                        streamJob(savedJobId, scriptText);
                        return;
                    }
                    // Completed or failed — clear and show fresh form
                } catch (_) {}
                resetToFresh();
                return;
            }
            // No saved job — only reconnect if latest is still running
            try {
                const res = await fetch('/script-job/latest');
                const job = await res.json();
                if (job.status === 'running' && job.job_id) {
                    localStorage.setItem('active_script_job_id', job.job_id);
                    streamJob(job.job_id, job.script_text || '');
                }
            } catch (_) {}
        }

        init();
    </script>
</body>
</html>
